# version: '3.8'

services:
  db:
    image: postgres:15-alpine
    command: postgres -c max_connections=350
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=retail_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d retail_db" ]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/retail_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
