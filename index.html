<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Store API</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: #121212;
            color: #e0e0e0;
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 30px;
        }

        h2 {
            color: #f5f5f5;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 1px solid #444;
        }

        h3 {
            color: #e0e0e0;
            margin-bottom: 10px;
        }

        section {
            background-color: #1e1e1e;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        /* Distinctive styling for Customer vs Admin */
        .customer-panel {
            border-left: 6px solid #4cafef;
        }

        .admin-panel {
            border-left: 6px solid #ff9800;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #2d2d2d;
            color: #ffffff;
            font-weight: bold;
        }

        th,
        td {
            border: 1px solid #3a3a3a;
            padding: 10px;
            text-align: left;
        }

        tr:nth-child(even) {
            background-color: #252525;
        }

        tr:nth-child(odd) {
            background-color: #1f1f1f;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border: 1px solid #444;
            border-radius: 6px;
            background-color: #2a2a2a;
            color: #ffffff;
        }

        input:focus {
            outline: none;
            border-color: #4cafef;
        }

        button {
            padding: 10px 16px;
            margin-top: 8px;
            border: none;
            border-radius: 6px;
            background-color: #4cafef;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #3793d9;
        }

        .btn-admin {
            background-color: #ff9800;
        }

        .btn-admin:hover {
            background-color: #e68a00;
        }

        .message {
            font-weight: bold;
            color: #81c784;
            margin-top: 10px;
            min-height: 20px;
        }

        .admin-box {
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

    <h1>🛍️ Retail Store Management</h1>

    <!-- DASHBOARD -->
    <section id="dashboard">
        <h2>📊 Live Inventory View</h2>
        <button onclick="loadInventory()">Refresh Inventory</button>
        <table id="inventory-table">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Tone</th>
                <th>Price</th>
                <th>Stock</th>
            </tr>
        </table>
    </section>

    <!-- CUSTOMER SECTION -->
    <section id="customer" class="customer-panel">
        <h2>👤 Customer Portal</h2>
        <h3>Purchase Items</h3>
        <input type="text" id="purchase-id" placeholder="Enter Item ID to Buy">
        <button onclick="purchaseItem()">Buy Item</button>
        <p class="message" id="purchase-message"></p>
    </section>

    <!-- ADMIN SECTION -->
    <section id="admin" class="admin-panel">
        <h2>🛡️ Admin Portal</h2>

        <div class="admin-box">
            <h3>Restock Existing Item</h3>
            <input type="text" id="restock-id" placeholder="Item ID">
            <input type="number" id="restock-amount" placeholder="Quantity to Add">
            <button class="btn-admin" onclick="restockItem()">Restock Item</button>
            <p class="message" id="restock-message"></p>
        </div>

        <div class="admin-box">
            <h3>Add Completely New Item</h3>
            <input type="text" id="add-id" placeholder="Item ID">
            <input type="text" id="add-name" placeholder="Item Name">
            <input type="text" id="add-tone" placeholder="Color Tone">
            <input type="number" id="add-price" placeholder="Price">
            <input type="number" id="add-stock" placeholder="Initial Stock">
            <button class="btn-admin" onclick="addItem()">Add to Store</button>
            <p class="message" id="admin-message"></p>
        </div>
    </section>

    <script>
        async function loadInventory() {
            const response = await fetch('/api/inventory');
            const items = await response.json();
            const table = document.getElementById('inventory-table');

            table.innerHTML = `<tr><th>ID</th><th>Name</th><th>Tone</th><th>Price</th><th>Stock</th></tr>`;
            items.forEach(item => {
                table.innerHTML += `<tr><td>${item.id}</td><td>${item.name}</td><td>${item.color_tone}</td><td>$${item.price}</td><td>${item.stock}</td></tr>`;
            });
        }

        async function purchaseItem() {
            const id = document.getElementById('purchase-id').value;
            const response = await fetch(`/api/purchase/${id}`, { method: 'POST' });
            const result = await response.json();
            document.getElementById('purchase-message').innerText = result.message || result.detail;
            loadInventory();
        }

        async function restockItem() {
            const id = document.getElementById('restock-id').value;
            const amount = document.getElementById('restock-amount').value;

            // Note how we pass the amount as a query parameter matching our FastAPI route
            const response = await fetch(`/api/restock/${id}?amount=${amount}`, { method: 'POST' });
            const result = await response.json();

            document.getElementById('restock-message').innerText = result.message || result.detail;
            loadInventory();
        }

        async function addItem() {
            const newItem = {
                id: document.getElementById('add-id').value,
                name: document.getElementById('add-name').value,
                color_tone: document.getElementById('add-tone').value,
                price: parseFloat(document.getElementById('add-price').value),
                stock: parseInt(document.getElementById('add-stock').value)
            };

            const response = await fetch('/api/inventory', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newItem)
            });

            const result = await response.json();
            document.getElementById('admin-message').innerText = result.message || result.detail;
            loadInventory();
        }

        loadInventory();
    </script>
</body>

</html>
