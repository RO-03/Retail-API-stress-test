<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retail Store — Shop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0d0f14;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* NAV */
        nav {
            background: rgba(15, 17, 24, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 0 2rem;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-brand {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .nav-badge {
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.3);
            color: #a78bfa;
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.78rem;
            font-weight: 500;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 3.5rem 2rem 2rem;
        }
        .hero h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #e2e8f0 40%, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            color: #64748b;
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        /* GRID */
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 1.25rem;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(99,102,241,0.4);
            box-shadow: 0 12px 40px rgba(99,102,241,0.12);
        }
        .card-id {
            font-size: 0.72rem;
            font-weight: 600;
            color: #6366f1;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .card-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.3;
        }
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #a78bfa;
        }
        .stock-pill {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
        }
        .stock-ok {
            background: rgba(34,197,94,0.15);
            color: #4ade80;
            border: 1px solid rgba(34,197,94,0.25);
        }
        .stock-low {
            background: rgba(234,179,8,0.15);
            color: #facc15;
            border: 1px solid rgba(234,179,8,0.25);
        }
        .buy-btn {
            margin-top: auto;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.65rem 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s ease, transform 0.15s ease;
            font-family: 'Inter', sans-serif;
        }
        .buy-btn:hover { opacity: 0.88; transform: scale(0.98); }
        .buy-btn:active { transform: scale(0.96); }
        .buy-btn:disabled {
            background: #1e2330;
            color: #475569;
            cursor: not-allowed;
            transform: none;
        }

        /* LOADING / EMPTY */
        .state-msg {
            text-align: center;
            color: #475569;
            padding: 4rem 2rem;
            font-size: 1rem;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(99,102,241,0.2);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        #toast.show { opacity: 1; transform: translateY(0); }
        #toast.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
        #toast.error   { background: rgba(239,68,68,0.15);  border: 1px solid rgba(239,68,68,0.3);  color: #f87171; }
    </style>
</head>
<body>

<nav>
    <span class="nav-brand">🛍️ RetailStore</span>
    <span class="nav-badge">Customer View</span>
</nav>

<div class="hero">
    <h1>Browse &amp; Buy</h1>
    <p>All items shown are in stock and ready to ship.</p>
</div>

<div class="container">
    <div id="items-container" class="grid">
        <div class="state-msg" style="grid-column:1/-1">
            <div class="spinner"></div>
            Loading items…
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `show ${type}`;
        setTimeout(() => { t.className = ''; }, 3000);
    }

    function stockClass(stock) {
        if (stock <= 3) return 'stock-pill stock-low';
        return 'stock-pill stock-ok';
    }

    async function loadItems() {
        const container = document.getElementById('items-container');
        try {
            const res = await fetch('/items');
            if (!res.ok) throw new Error();
            const items = await res.json();
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = '<p class="state-msg" style="grid-column:1/-1">No items available right now. Check back later!</p>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="card-id">ID #${item.id}</span>
                    <span class="card-name">${item.name}</span>
                    <div class="card-meta">
                        <span class="card-price">$${item.price.toFixed(2)}</span>
                        <span class="${stockClass(item.stock)}">${item.stock} left</span>
                    </div>
                    <button class="buy-btn" id="buy-${item.id}" onclick="purchase(${item.id})">Buy Now</button>
                `;
                container.appendChild(card);
            });
        } catch {
            container.innerHTML = '<p class="state-msg" style="grid-column:1/-1">⚠️ Failed to load items. Please refresh.</p>';
        }
    }

    async function purchase(id) {
        const btn = document.getElementById(`buy-${id}`);
        btn.disabled = true;
        btn.textContent = 'Processing…';
        try {
            const res = await fetch(`/purchase/${id}`, { method: 'POST' });
            if (res.ok) {
                showToast('✅ Purchase successful!', 'success');
                await loadItems();
            } else {
                const err = await res.json().catch(() => ({}));
                showToast(err.detail || '❌ Item out of stock.', 'error');
                btn.disabled = false;
                btn.textContent = 'Buy Now';
            }
        } catch {
            showToast('❌ Network error. Try again.', 'error');
            btn.disabled = false;
            btn.textContent = 'Buy Now';
        }
    }

    loadItems();
</script>
</body>
</html>
